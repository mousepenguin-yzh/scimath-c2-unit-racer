<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>挑戰二：極速單位配對賽車 (Step 3 - 完全修復版)</title>
    <!-- 引入親和力圓體字型 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Zen+Maru+Gothic:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        /* ==========================================================================
           1. 全域重置與基礎美學 (強制鎖定 viewport 防止行動端滾動破版)
           ========================================================================== */
        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            position: fixed; /* 鎖定行動端彈跳 */
            background-color: #2C2A29; /* 外圍深碳色背景 */
            font-family: 'Zen Maru Gothic', 'Fredoka', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        /* ==========================================================================
           2. RWD 16:9 絕對縮放核心視窗 (改為 position: fixed 確保絕對居中)
           ========================================================================== */
        #game-viewport {
            position: fixed;
            width: 1280px;
            height: 720px;
            background-color: #FFFDF9; /* 溫潤奶油白 */
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            border-radius: 24px;
            transform-origin: center center;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%) scale(1);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 24px;
        }

        /* ==========================================================================
           3. 單機選單與結算畫面 (移入遊戲視窗內部，100% 繼承 RWD 縮放)
           ========================================================================== */
        #main-menu {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #FFFDF9;
            z-index: 1500; /* 覆蓋在遊戲畫面之上 */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
            border-radius: 18px;
        }

        .menu-title {
            font-size: 52px;
            font-weight: 700;
            color: #4A4644;
            margin-bottom: 8px;
            text-align: center;
            letter-spacing: 1.5px;
        }

        .menu-subtitle {
            font-size: 20px;
            color: #7B7672;
            margin-bottom: 48px;
            font-weight: 700;
        }

        /* 水平排版一列式選單 (左至右並排) */
        .level-grid {
            display: flex;
            flex-direction: row;
            justify-content: center;
            align-items: center;
            gap: 16px;
            width: 100%;
            max-width: 1200px;
            margin-bottom: 48px;
        }

        .level-card {
            flex: 1;
            background-color: white;
            border-radius: 24px;
            padding: 20px 12px;
            text-align: center;
            cursor: pointer;
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.2s;
            box-shadow: 0 8px 24px rgba(0,0,0,0.04);
            border: 4px solid transparent;
            min-height: 175px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .level-card:active {
            transform: scale(0.93);
        }

        .level-num {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .level-desc {
            font-size: 16px;
            font-weight: 700;
            color: #7B7672;
            line-height: 1.4;
        }

        #highscore-display {
            font-size: 18px;
            font-weight: 700;
            color: #5D79D4;
            background-color: #F0F4FF;
            padding: 10px 24px;
            border-radius: 16px;
            border: 2px solid #C6D2F5;
        }

        /* 結算畫面 */
        #settlement-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(44, 42, 41, 0.96);
            z-index: 2000;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            padding: 40px;
            border-radius: 18px;
        }

        .settlement-title {
            font-size: 48px;
            font-weight: 700;
            color: #FFD700;
            margin-bottom: 24px;
            letter-spacing: 2px;
        }

        .score-display-row {
            font-size: 64px;
            font-weight: 700;
            color: white;
            margin-bottom: 12px;
        }

        .combo-bonus-row {
            font-size: 24px;
            font-weight: 700;
            color: #E6FFFA;
            margin-bottom: 30px;
        }

        #perfect-badge-container {
            display: none;
            flex-direction: column;
            align-items: center;
            margin-bottom: 36px;
            animation: bounceIn 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .gold-badge {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            background: radial-gradient(circle, #FFE259 0%, #FFA751 100%);
            border: 6px solid #FFFFFF;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            box-shadow: 0 10px 25px rgba(255,167,81,0.5);
            margin-bottom: 10px;
        }

        .badge-text {
            font-size: 20px;
            font-weight: 700;
            color: #FFD700;
            text-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }

        .settlement-btn-row {
            display: flex;
            gap: 20px;
        }

        .settlement-btn {
            padding: 12px 36px;
            border-radius: 18px;
            font-size: 22px;
            font-weight: 700;
            cursor: pointer;
            border: none;
            transition: transform 0.1s;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }
        .settlement-btn:active { transform: scale(0.95); }

        .btn-restart { background-color: #38A169; color: white; }
        .btn-menu { background-color: #5D79D4; color: white; }

        @keyframes bounceIn {
            0% { transform: scale(0.3); opacity: 0; }
            50% { transform: scale(1.05); opacity: 0.8; }
            70% { transform: scale(0.9); opacity: 0.9; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* ==========================================================================
           4. 頂部控制與資訊欄位
           ========================================================================== */
        .top-navbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            height: 56px;
            gap: 12px;
        }

        #btn-exit {
            background-color: #FFF0F0;
            color: #D45D5D;
            border: 3px solid #F5C6C6;
            padding: 8px 16px;
            border-radius: 16px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: transform 0.1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            outline: none;
        }
        #btn-exit:active { transform: scale(0.92); }

        #question-progress {
            background-color: #FFF9E6;
            color: #C08A3E;
            border: 3px solid #F5E3A6;
            padding: 8px 14px;
            border-radius: 16px;
            font-size: 18px;
            font-weight: 700;
            min-width: 100px;
            text-align: center;
        }

        .timer-container {
            flex-grow: 1;
            height: 24px;
            background-color: #E6E6E6;
            border-radius: 12px;
            overflow: hidden;
            border: 3px solid #D0D0D0;
            position: relative;
        }

        #timer-bar {
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, #FFAE34, #FF7E36);
            border-radius: 8px;
            transition: width 0.05s linear;
        }

        #score-badge {
            background-color: #F0FFF4;
            color: #38A169;
            border: 3px solid #C6F5CE;
            padding: 8px 16px;
            border-radius: 16px;
            font-size: 18px;
            font-weight: 700;
            min-width: 110px;
            text-align: center;
        }

        #combo-badge {
            background-color: #F0F4FF;
            color: #5D79D4;
            border: 3px solid #C6D2F5;
            padding: 8px 16px;
            border-radius: 16px;
            font-size: 18px;
            font-weight: 700;
            text-align: center;
            min-width: 110px;
        }

        /* ==========================================================================
           5. 中央字卡區
           ========================================================================== */
        #card-container {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            perspective: 1200px;
            margin: 15px 0;
            position: relative;
            transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1);
        }

        #card-container.flipped {
            transform: translateY(-35px);
        }

        .game-card {
            width: 620px; 
            height: 260px; 
            border-radius: 28px;
            box-shadow: 0 12px 30px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: absolute;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #card-front {
            background-color: #FFF9E6;
            border: 6px solid #F5E3A6;
            z-index: 2;
            transform: rotateY(0deg);
        }

        #card-back {
            background-color: #F9FFF0;
            border: 6px solid #D9F5A6;
            z-index: 1;
            transform: rotateY(180deg);
            padding: 16px 24px;
            justify-content: space-between;
        }

        #card-container.flipped #card-front {
            display: none !important;
            transform: rotateY(-180deg);
        }

        #card-container.flipped #card-back {
            display: flex !important;
            transform: rotateY(0deg);
            z-index: 2;
        }

        .formula-display {
            font-size: 44px;
            font-weight: 700;
            color: #4A4644;
            display: flex;
            align-items: center;
            gap: 14px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .formula-target {
            color: #FF7E36;
            border-bottom: 5px dashed #FF7E36;
            padding-bottom: 2px;
        }

        .hint-title {
            font-size: 28px;
            font-weight: 700;
            color: #557A3A;
            margin-bottom: 4px;
            text-align: center;
        }
